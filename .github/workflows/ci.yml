name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more if needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.txt ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: securego/gosec@6fbd381238e97e1d1f3358f0d6d65de78dcf9245 # v2.22.5
        with:
          # probaci is a CI orchestrator: it runs subprocesses (G204) and reads/
          # writes user-named files (G304/G306) with conventional perms
          # (G301/G302) by design, and G104 duplicates errcheck. The high-severity
          # taint rules (G702/G703) stay on, with #nosec on the few benign sites.
          args: "-exclude=G104,G204,G301,G302,G304,G306 ./..."

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7

  # Dogfood: probaci proves itself. Scoped to the platform/security stages that
  # aren't already covered by the dedicated jobs above (lint/govulncheck/gosec/
  # gitleaks run separately), so this stays fast and non-duplicative.
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
      - run: go run ./cmd/probaci run --ci --only detect,workflow-lint,versions,secrets
