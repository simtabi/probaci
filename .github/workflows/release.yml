name: release

# Every release is tag-driven: GoReleaser cross-compiles the full matrix, builds
# the archives/packages and a reproducible source tarball, generates SBOMs and
# checksums, pushes the container image, cosign-signs the checksums, creates the
# GitHub Release (body from the tagged CHANGELOG section), and updates the
# Homebrew/Scoop manifests. A build-provenance attestation is then signed for
# every artifact via the checksums file.
on:
  push:
    tags: ["v*"]

# A newer tag must never abort an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      contents: write      # create the GitHub Release, upload assets
      id-token: write       # cosign keyless signing + provenance via OIDC
      attestations: write   # write the build-provenance attestation
      packages: write       # push the container image
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      # syft powers GoReleaser's SBOM generation.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Extract CHANGELOG section for this tag
        run: ./scripts/extract-changelog.sh "${GITHUB_REF_NAME}" > release_notes.md
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          # Pin the GoReleaser series so the config schema and the tool stay in
          # sync (avoids `latest` deprecating config keys out from under a release).
          version: "~> v2.4"
          args: release --clean --release-notes=release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to the Homebrew tap + Scoop bucket repos.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      # Sign a build-provenance attestation for every released artifact. The
      # checksums file lists them all, so `gh attestation verify <file>
      # --repo simtabi/probaci` works for any downloaded binary or archive.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-checksums: build/dist/checksums.txt
