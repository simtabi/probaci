# GoReleaser configuration — cross-platform/arch builds, checksums, cosign
# signing, SLSA provenance, and an SBOM per release.
version: 2

project_name: probaci

# Keep all build tooling under a single build/ folder: inputs (targets.txt) at
# build/ root, generated artifacts under build/dist/ (gitignored).
dist: build/dist

before:
  hooks:
    - go mod tidy

builds:
  - id: probaci
    main: ./cmd/probaci
    binary: probaci
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/simtabi/probaci/internal/version.Version={{.Version}}
      - -X github.com/simtabi/probaci/internal/version.Commit={{.ShortCommit}}
      - -X github.com/simtabi/probaci/internal/version.Date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: ["amd64", "arm64", "arm", "386"]
    goarm: ["6", "7"]
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm

# A single macOS universal binary (amd64 + arm64) alongside the per-arch ones.
universal_binaries:
  - id: probaci
    ids: [probaci]
    name_template: probaci
    replace: false

# All artifacts use one flat, versionless, Go-style naming scheme:
#   probaci_<os>_<arch>[.ext]  with darwin → macos, e.g.
#   probaci_macos_arm64, probaci_linux_amd64, probaci_windows_386.exe,
#   probaci_macos_universal, probaci_linux_armv7.
# The release tag carries the version. install scripts reconstruct these names.
archives:
  - id: binary
    ids: [probaci]
    formats: [binary]
    name_template: &name >-
      probaci_{{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "all" }}universal{{ else if eq .Arch "arm" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}

  - id: archive
    ids: [probaci]
    name_template: *name
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# Native Linux packages (nfpm operates on the Linux builds only).
nfpms:
  - id: packages
    ids: [probaci]
    package_name: probaci
    formats: [deb, rpm, apk]
    maintainer: "Imani Manyara <imani@simtabi.com>"
    vendor: "Simtabi LLC"
    homepage: "https://opensource.simtabi.com/products/probaci"
    description: "Prove your CI pipeline before you push."
    license: MIT
    bindir: /usr/bin
    file_name_template: 'probaci_linux_{{ if eq .Arch "arm" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}'

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Local `goreleaser release --snapshot` (see `task bundle`) gets a sane version.
snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

# Reproducible source tarball, uploaded as a first-class release asset next to
# GitHub's auto-generated "Source code" links, so every release ships the exact
# code as well as the binaries.
source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"

# One SBOM per archive (syft, SPDX-JSON), attached as release assets so
# consumers can audit the supply chain of what they download.
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signing of the checksums file (release CI only; skipped in
# snapshot/bundle). OIDC provides the identity.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

dockers:
  - image_templates:
      - "ghcr.io/simtabi/probaci:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/simtabi/probaci"
  - image_templates:
      - "ghcr.io/simtabi/probaci:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/simtabi/probaci"

docker_manifests:
  - name_template: "ghcr.io/simtabi/probaci:{{ .Version }}"
    image_templates:
      - "ghcr.io/simtabi/probaci:{{ .Version }}-amd64"
      - "ghcr.io/simtabi/probaci:{{ .Version }}-arm64"
  - name_template: "ghcr.io/simtabi/probaci:latest"
    image_templates:
      - "ghcr.io/simtabi/probaci:{{ .Version }}-amd64"
      - "ghcr.io/simtabi/probaci:{{ .Version }}-arm64"

homebrew_casks:
  # The tap is shared across all Simtabi products: GoReleaser writes only this
  # product's Casks/probaci.rb into simtabi/homebrew-tap, leaving every other
  # product's cask untouched. Users: `brew install simtabi/tap/probaci`.
  - name: probaci
    ids: [archive]
    directory: Casks
    repository:
      owner: simtabi
      name: homebrew-tap
      branch: main
      # Cross-repo tap push needs a PAT (the default GITHUB_TOKEN is scoped to
      # this repo). Set the TAP_GITHUB_TOKEN secret before releasing.
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Imani Manyara
      email: imanimanyara@users.noreply.github.com
    homepage: "https://opensource.simtabi.com/products/probaci"
    description: "Prove your CI pipeline before you push."
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/probaci"],
              sudo: false
          end

scoops:
  # Shared Scoop bucket, one manifest per product (bucket/probaci.json).
  - name: probaci
    ids: [archive]
    directory: bucket
    repository:
      owner: simtabi
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Imani Manyara
      email: imanimanyara@users.noreply.github.com
    homepage: "https://opensource.simtabi.com/products/probaci"
    description: "Prove your CI pipeline before you push."
    license: MIT

winget:
  # Winget manifest PR'd to microsoft/winget-pkgs (package id Simtabi.probaci).
  # Gated behind SKIP_WINDOWS_PKGS until the winget-pkgs fork exists.
  - name: probaci
    publisher: Simtabi
    ids: [archive]
    license: MIT
    homepage: "https://opensource.simtabi.com/products/probaci"
    short_description: "Prove your CI pipeline before you push."
    description: "probaci proves your CI pipeline locally before you push."
    publisher_url: "https://simtabi.com"
    release_notes_url: "https://github.com/simtabi/probaci/releases/tag/{{ .Tag }}"
    repository:
      owner: simtabi
      name: winget-pkgs
      branch: "probaci-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    skip_upload: '{{ envOrDefault "SKIP_WINDOWS_PKGS" "true" }}'

release:
  github:
    owner: simtabi
    name: probaci
