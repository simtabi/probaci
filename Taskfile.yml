# Canonical dev tasks for probaci. Run with `task <name>` (https://taskfile.dev).
# The Makefile forwards to these, and `go build`/`go install` work standalone —
# one definition, three entrypoints.
version: "3"

vars:
  BIN: bin/probaci
  PKG: ./cmd/probaci
  MODULE: github.com/simtabi/probaci
  # Version stamp for non-GoReleaser builds (falls back to "dev" outside git).
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  LDFLAGS: -s -w -X github.com/simtabi/probaci/internal/version.Version={{.VERSION}}

tasks:
  default:
    cmds: [task: build]

  build:
    desc: Build the probaci binary into ./bin (version-stamped)
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN}} {{.PKG}}

  install:
    desc: Install probaci into GOBIN/PATH via the Go toolchain
    cmds:
      - go install {{.PKG}}

  run:
    desc: Run probaci from source (pass args after --)
    cmds:
      - go run {{.PKG}} {{.CLI_ARGS}}

  test:
    desc: Run the test suite with the race detector
    cmds:
      - go test -race ./...

  cover:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.txt ./...
      - go tool cover -func=coverage.txt | tail -1

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint (must be installed)
    cmds:
      - golangci-lint run

  fmt:
    desc: Format the codebase
    cmds:
      - gofmt -w .

  tidy:
    desc: Tidy go.mod/go.sum
    cmds:
      - go mod tidy

  release-check:
    desc: Validate the GoReleaser configuration
    cmds:
      - goreleaser check

  bundle:
    desc: Build local release deliverables (archives + checksums) into ./dist
    cmds:
      # Skip release-only steps (publish/sign/docker/sbom) so this runs offline
      # with no OIDC/cosign/registry/syft needed; produces dist/*.tar.gz, *.zip,
      # and checksums.txt.
      - goreleaser release --snapshot --clean --skip=publish,sign,docker,sbom

  snapshot:
    desc: Alias for `bundle` (local multi-arch deliverables, no publish)
    cmds:
      - task: bundle

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin dist coverage.txt
