name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more if needed.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.txt ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
      # Pinned: govulncheck @latest (v1.4.0) segfaults under the go1.25 toolchain.
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
      # Build gosec with the runner's Go — the gosec docker action bundles an
      # older Go that cannot load a `go 1.24` module.
      # probaci is a CI orchestrator: it runs subprocesses (G204) and reads/writes
      # user-named files (G304/G306) with conventional perms (G301/G302) by
      # design, and G104 duplicates errcheck. The high-severity taint rules
      # (G702/G703) stay on, with #nosec on the few benign sites.
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: |
          "$(go env GOPATH)/bin/gosec" -exclude=G104,G204,G301,G302,G304,G306 ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Run gitleaks directly (the gitleaks-action requires a paid license for
      # org repos). Scans the working tree and honors .gitleaks.toml.
      - run: |
          docker run --rm -v "${{ github.workspace }}:/repo" -w /repo \
            zricethezav/gitleaks:latest dir . --no-banner --redact --exit-code 1

  # Dogfood: probaci proves itself. Scoped to the platform/security stages that
  # aren't already covered by the dedicated jobs above (lint/govulncheck/gosec/
  # gitleaks run separately), so this stays fast and non-duplicative.
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
      - run: go run ./cmd/probaci run --ci --only detect,workflow-lint,versions,secrets
